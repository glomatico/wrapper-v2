name: build

on:
  push:
    branches: [main, phase-1]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    # Fork PRs cannot use repository secrets (APK_URL).
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository

    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64]

    env:
      APK_URL: ${{ secrets.APK_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            jq unzip curl ca-certificates

      - name: Make scripts executable
        run: chmod +x tools/fetch-apk.sh tools/extract-libs.sh tools/stage-system.sh

      - name: Sanity check APK_URL secret
        run: |
          if [[ -z "${APK_URL}" ]]; then
            echo "::error::APK_URL secret is not set."
            echo "Maintainers: set APK_URL to a URL for the pinned .apkm (hash in LIBS_VERSION.json → apkm)."
            exit 1
          fi

      - name: Download and verify .apkm
        run: |
          mkdir -p .tmp
          ./tools/fetch-apk.sh \
            --url "${APK_URL}" \
            --expect apkm \
            --out .tmp/bundle.apkm

      - name: Extract Apple native libs
        run: |
          ./tools/extract-libs.sh \
            --bundle .tmp/bundle.apkm \
            --arch ${{ matrix.arch }} \
            --out rootfs/system/lib64

      - name: Stage Android system binaries
        run: |
          ./tools/stage-system.sh --arch ${{ matrix.arch }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg TARGET_ARCH=${{ matrix.arch }} \
            -t wrapper-v2:${{ github.sha }} \
            .

      - name: Smoke test (/health)
        run: |
          docker run --rm -d \
            --name wrapper-smoke \
            --cap-add SYS_ADMIN --cap-add SYS_CHROOT \
            -p 8080:80 \
            wrapper-v2:${{ github.sha }}
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:8080/health >/dev/null; then
              echo "health OK after ${i} attempt(s)"
              break
            fi
            sleep 0.5
          done
          curl -sf http://127.0.0.1:8080/health | jq .
          docker stop wrapper-smoke
